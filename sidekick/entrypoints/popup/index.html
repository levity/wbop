<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      padding: 12px;
      width: 200px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9E9E9E;
    }
    .status-dot.connected { background: #4CAF50; }
    .status { margin-bottom: 12px; color: #666; }
    input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button.connect { background: #4CAF50; color: white; }
    button.disconnect { background: #f44336; color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #f44336; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>
    Sidekick
    <span class="status-dot" id="statusDot"></span>
  </h1>
  <div class="status" id="status">Not connected</div>
  <input type="text" id="url" value="ws://localhost:8765" placeholder="ws://localhost:8765">
  <button id="button" class="connect">Connect</button>
  <div class="error" id="error"></div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
